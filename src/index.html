<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Last Train Home is a compact browser arcade game about catching the final midnight train before time runs out." />
    <title>Last Train Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell" aria-label="Last Train Home game">
      <section class="hero">
        <p class="eyebrow">Midnight platform · one chance</p>
        <h1>Last Train Home</h1>
        <p class="intro">Collect tickets, dodge the night shadows, and board before the final whistle.</p>
      </section>

      <section class="game-card">
        <div class="hud" aria-label="Game status">
          <div><span>Tickets</span><strong id="tickets">0/5</strong></div>
          <div><span>Time</span><strong id="time">60</strong></div>
          <div><span>Energy</span><strong id="energy">100%</strong></div>
          <div><span>Score</span><strong id="score">0</strong></div>
        </div>

        <div class="canvas-wrap">
          <canvas id="game" width="960" height="540" aria-label="Playable Last Train Home game canvas"></canvas>
          <div id="overlay" class="overlay">
            <h2>Catch the last train</h2>
            <p>Move with WASD/arrow keys. Collect 5 golden tickets, avoid shadows, then reach the train door.</p>
            <button id="startButton" type="button">Start run</button>
          </div>
        </div>

        <div class="controls" aria-label="Touch controls">
          <button data-dir="up" aria-label="Move up">▲</button>
          <div>
            <button data-dir="left" aria-label="Move left">◀</button>
            <button data-dir="down" aria-label="Move down">▼</button>
            <button data-dir="right" aria-label="Move right">▶</button>
          </div>
        </div>
      </section>
    </main>

    <script src="game.js" type="module"></script>
  </body>
</html>
